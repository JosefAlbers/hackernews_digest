name: Update Show HN Archive

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-update

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"

      - run: |
          pip install requests beautifulsoup4 mlx-code==0.0.35

      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/

          git diff --staged --quiet || git commit -m "Daily archive update"

          git push
